<!DOCTYPE html>

<html>
<head>
	<meta charset="UTF-8" />	
	<title>image 요소 연습</title>
</head>
<!-- 
	img : 이미지태그
	  - src속성 : image uri
 -->
<body>
	<h2>절대경로[http://~ 로시작하는경로]</h2><hr>
	<h4>다른 싸이트에있는 이미지</h4>
	<div>
		<img width="80" height ="80 "src="https://thumbnail8.coupangcdn.com/thumbnails/remote/230x230ex/image/rs_quotation_api/vez116c9/fcf2281591324018965fec9dbcdc0a34.jpg">
		
	</div>
	<h4>같은 싸이트에있는 이미지</h4>
	<div>
		<img src="http://localhost/htmlSite/penguin1.gif">
		<img src="http://localhost/htmlSite/penguin2.gif">
		<img src="http://localhost/htmlSite/penguin3.gif">
		<br>
		<img src="http://localhost/htmlSite/image/car1.jpg">
		
	</div>5
	<hr>
	<h2>상대경로[http://~ 로시작하지않는경로]</h2><hr>
	<h4>같은 싸이트에있는 이미지-->기준경로 [http://localhost/htmlSite]</h4>
	<div>
		<img src="penguin1.gif">
		<img src="penguin2.gif">
		<img src="penguin3.gif">
		<br>
		<img src="image/car1.jpg">
		
	</div>
	
	<h3>image에 링크(a tag)걸기</h3><br>
	<div>
		<a href=''><img src='image/daumlogo.png'></a>	
		<a href=''><img src='image/googlelogo.png'></a>	
	</div>
</body>
</html>
